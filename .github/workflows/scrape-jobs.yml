name: Scrape govt jobs

on:
  schedule:
    # Once daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: scrape-jobs
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/scrape.mjs

      - name: Commit updated data
        run: |
          git config user.name "jobs-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes this cycle."
          else
            git commit -m "chore: update jobs data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git pull --rebase origin main
            git push
          fi
